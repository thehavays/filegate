name: filegate
base: core22
version: '1.0.0'
title: FileGate
summary: Multi-protocol file server manager with TAB completion
description: |
  FileGate is a powerful command-line tool to list, browse, pull, and push files
  across SFTP, FTP, and SMB servers. It features an interactive shell and
  smart TAB completion for both local and remote paths.
license: MIT
contact: https://github.com/thehavays/filegate/issues

lint:
  ignore:
    - library: [usr/lib/x86_64-linux-gnu/libsecret-1.so.0.0.0]

issues: https://github.com/thehavays/filegate/issues
source-code: https://github.com/thehavays/filegate
website: https://github.com/thehavays/filegate

grade: stable
confinement: strict

apps:
  fgate:
    command: bin/fgate
    completer: bash_completion
    plugs:
      - network
      - network-bind
      - home
      - ssh-keys
      - password-manager-service

parts:
  filegate:
    plugin: python
    source: .
    python-packages:
      - paramiko
      - smbprotocol
      - keyring
      - rich
      - cryptography
    stage-packages:
      - libsecret-1-0

  completions:
    plugin: dump
    source: completions/
    organize:
      bash_completion: bash_completion
      zsh_completion: share/zsh/site-functions/_fgate
    prime:
      - bash_completion
      - share/zsh/site-functions/_fgate
